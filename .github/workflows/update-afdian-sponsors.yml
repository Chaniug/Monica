name: Update Afdian sponsors

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Update README
        env:
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
          AFDIAN_USER_ID: 8b131882c4ec11f0b26e52540025c377
        run: python .github/scripts/update_afdian_sponsors.py
      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update Afdian sponsor list"
          git push
